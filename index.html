        function App() {
            const [appState, setAppState] = useState('welcome');
            const [blocks, setBlocks] = useState([]);
            const [currentBlock, setCurrentBlock] = useState(null);
            const [queue, setQueue] = useState([]);
            const [currentWord, setCurrentWord] = useState('');
            const [userInput, setUserInput] = useState('');
            const [isChecked, setIsChecked] = useState(false);
            const [isCorrect, setIsCorrect] = useState(false);
            const [showHint, setShowHint] = useState(false);
            const [viewingBlockWords, setViewingBlockWords] = useState(null);
            
            const [totalWordsCount, setTotalWordsCount] = useState(0);
            const [completedCount, setCompletedCount] = useState(0);
            const inputRef = useRef(null);

            // Load voices early and initialize permanent blocks
            useEffect(() => {
                const loadVoices = () => { window.speechSynthesis.getVoices(); };
                loadVoices();
                if ('speechSynthesis' in window && window.speechSynthesis.onvoiceschanged !== undefined) {
                    window.speechSynthesis.onvoiceschanged = loadVoices;
                }

                // ব্রাউজারের স্টোরেজ থেকে ব্লকগুলো খোঁজার চেষ্টা (নতুন শব্দ যোগ হওয়ায় ভার্সন ৮ ব্যবহার করা হয়েছে)
                const storedBlocks = localStorage.getItem('bcs_spelling_blocks_v8');
                if (storedBlocks) {
                    setBlocks(JSON.parse(storedBlocks));
                } else {
                    // প্রথমবার লোড হলে সফল করে ২০টি করে শব্দের ব্লক তৈরি করে সেভ করা
                    const shuffled = [...initialWordList].sort(() => Math.random() - 0.5);
                    const newBlocks = [];
                    for (let i = 0; i < shuffled.length; i += 20) {
                        const blockLetter = String.fromCharCode(65 + (i / 20)); // A, B, C, D...
                        newBlocks.push({
                            id: blockLetter,
                            title: `ব্লক - ${blockLetter}`,
                            words: shuffled.slice(i, i + 20)
                        });
                    }
                    localStorage.setItem('bcs_spelling_blocks_v8', JSON.stringify(newBlocks));
                    setBlocks(newBlocks);
                }
            }, []);

            const speakWord = (word) => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    window.speechSynthesis.resume();
                    
                    const utterance = new SpeechSynthesisUtterance(word);
                    const voices = window.speechSynthesis.getVoices();
                    
                    // Chrome এবং অন্যান্য ব্রাউজারের জন্য আরও গভীরভাবে বাংলা ভয়েস খোঁজা (bn-BD, bn-IN, bangla, bengali)
                    let bestVoice = voices.find(v => 
                        v.lang.includes('bn') || 
                        v.name.toLowerCase().includes('bangla') || 
                        v.name.toLowerCase().includes('bengali') ||
                        v.lang === 'bn-BD' || 
                        v.lang === 'bn-IN'
                    );
                    
                    if (bestVoice) { 
                        utterance.voice = bestVoice; 
                        utterance.lang = bestVoice.lang;
                    } else {
                        utterance.lang = 'bn-BD'; // ভয়েস না পেলেও বাংলা ল্যাঙ্গুয়েজ ট্যাগ ফোর্স করা
                    }
                    
                    utterance.rate = 0.85;
                    window.speechSynthesis.speak(utterance);
                }
            };

            const showWordHint = () => {
                setShowHint(true);
                setTimeout(() => {
                    setShowHint(false);
                    if (inputRef.current) inputRef.current.focus();
                }, 1500);
            };

            const startPractice = (block) => {
                const wordsToPractice = [...block.words];
                setCurrentBlock(block);
                setQueue(wordsToPractice);
                setTotalWordsCount(wordsToPractice.length);
                setCompletedCount(0);
                setAppState('practice');
                
                const firstWord = wordsToPractice[0];
                setCurrentWord(firstWord);
                setQueue(wordsToPractice.slice(1));
                setTimeout(() => speakWord(firstWord), 500);
            };

            // বাংলা ইউনিকোড নরমালাইজেশন ফাংশন
            const normalizeBengali = (text) => {
                if (!text) return '';
                return text
                    .trim()
                    .replace(/[\u200B-\u200D\uFEFF]/g, '') // ZWNJ বা অদৃশ্য ক্যারেক্টার রিমুভ করা
                    .normalize('NFC'); // ইউনিকোড স্ট্যান্ডার্ডাইজ করা (যেমন: য+় = য়)
            };

            const handleFormSubmit = (e) => {
                e.preventDefault();
                
                if (!isChecked) {
                    // প্রথম Enter (চেক করা)
                    if (!userInput.trim()) return;

                    // নরমালাইজ করে শব্দ দুটো মেলানো হচ্ছে
                    const normalizedInput = normalizeBengali(userInput);
                    const normalizedWord = normalizeBengali(currentWord);

                    const correct = normalizedInput === normalizedWord;
                    setIsCorrect(correct);
                    setIsChecked(true);

                    if (correct) {
                        setCompletedCount(prev => prev + 1);
                    } else {
                        setQueue(prevQueue => [...prevQueue, currentWord]);
                    }
                } else {
                    // দ্বিতীয় Enter (পরবর্তী শব্দে যাওয়া)
                    handleNext();
                }
            };

            const handleNext = () => {
                if (queue.length === 0) {
                    setAppState('finished');
                    return;
                }

                const nextWord = queue[0];
                setCurrentWord(nextWord);
                setQueue(queue.slice(1));
                setUserInput('');
                setIsChecked(false);
                setShowHint(false);
                speakWord(nextWord);
                
                setTimeout(() => { if (inputRef.current) inputRef.current.focus(); }, 100);
            };

            const progressPercentage = totalWordsCount === 0 ? 0 : Math.round((completedCount / totalWordsCount) * 100);

            return (
                <div className="flex flex-col items-center justify-start sm:justify-center p-2 sm:p-4 py-4 sm:py-12 min-h-screen">
                    <div className="text-center mb-4 sm:mb-8 mt-2 sm:mt-0">
                        <h1 className="text-2xl sm:text-3xl font-bold text-slate-800 mb-2">বিসিএস বানান শুদ্ধি অনুশীলন</h1>
                        <p className="text-slate-600 text-xs sm:text-sm max-w-lg mx-auto px-2">

                        </p>
                    </div>

                    <div className="w-full max-w-xl bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
                        {appState === 'welcome' && (
                            <div className="p-4 sm:p-10 text-center flex flex-col items-center">
                                <div className="w-16 h-16 sm:w-20 sm:h-20 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mb-4 sm:mb-6">
                                    <PlayCircle />
                                </div>
                                <h2 className="text-xl sm:text-2xl font-semibold text-slate-800 mb-2 sm:mb-4">অনুশীলন শুরু করুন</h2>
                                <p className="text-slate-600 text-sm sm:text-base mb-6 px-2">
                                    মোট শব্দ: <span className="font-bold text-slate-800">{initialWordList.length}</span> টি। <br/>
                                    সহজে শেখার জন্য শব্দগুলোকে স্থায়ী ব্লকে ভাগ করা হয়েছে।
                                </p>
                                
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4 w-full">
                                    {blocks.map(block => (
                                        <div key={block.id} className="bg-slate-50 border-2 border-slate-200 rounded-xl flex flex-col shadow-sm hover:shadow-md transition-all active:scale-[0.98]">
                                            <button 
                                                onClick={() => startPractice(block)} 
                                                className="py-3 sm:py-4 px-4 hover:bg-blue-50 hover:border-blue-400 text-slate-700 hover:text-blue-700 font-medium flex flex-col items-center gap-1 rounded-t-xl transition-colors active:bg-blue-100"
                                            >
                                                <span className="text-lg sm:text-xl font-bold">{block.title}</span>
                                                <span className="text-xs text-slate-500">{block.words.length} টি শব্দ</span>
                                            </button>
                                            <div className="border-t border-slate-200 w-full">
                                                <button
                                                    onClick={() => setViewingBlockWords(viewingBlockWords === block.id ? null : block.id)}
                                                    className="w-full py-2.5 sm:py-2 text-xs sm:text-sm text-slate-500 hover:text-blue-600 hover:bg-slate-100 flex items-center justify-center gap-1 rounded-b-xl transition-colors active:bg-slate-200"
                                                >
                                                    <Eye /> {viewingBlockWords === block.id ? 'লুকান' : 'শব্দগুলো দেখুন'}
                                                </button>
                                            </div>
                                            {viewingBlockWords === block.id && (
                                                <div className="p-3 bg-white border-t border-slate-200 rounded-b-xl text-xs text-slate-600 flex flex-wrap gap-1 justify-center max-h-40 overflow-y-auto">
                                                    {block.words.map((w, idx) => (
                                                        <span key={idx} className="bg-slate-100 px-2 py-1 rounded border border-slate-200">{w}</span>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {appState === 'practice' && (
                            <div>
                                <div className="bg-slate-50 border-b border-slate-100 p-3 sm:p-4">
                                    <div className="flex justify-between items-center text-xs sm:text-sm text-slate-600 mb-2 font-medium">
                                        <div className="flex items-center gap-2">
                                            <button onClick={() => setAppState('welcome')} className="p-1.5 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded transition-colors active:scale-95" title="হোম স্ক্রিনে ফিরে যান">
                                                <HomeIcon />
                                            </button>
                                            <span>{currentBlock?.title} | অগ্রগতি: {progressPercentage}%</span>
                                        </div>
                                        <span>{completedCount} / {totalWordsCount}</span>
                                    </div>
                                    <div className="w-full bg-slate-200 rounded-full h-2 sm:h-2.5">
                                        <div className="bg-green-500 h-2 sm:h-2.5 rounded-full transition-all duration-500 ease-out" style={{ width: `${progressPercentage}%` }}></div>
                                    </div>
                                </div>

                                <div className="p-4 sm:p-8">
                                    <div className="flex flex-col items-center mb-4 sm:mb-6">
                                        <div className="flex gap-3 sm:gap-4">
                                            <button onClick={() => speakWord(currentWord)} className="w-14 h-14 sm:w-16 sm:h-16 bg-blue-100 hover:bg-blue-200 text-blue-600 rounded-full flex items-center justify-center transition-colors shadow-sm active:scale-90" title="আবার শুনুন">
                                                <Volume2 />
                                            </button>
                                            <button type="button" onClick={showWordHint} className="w-14 h-14 sm:w-16 sm:h-16 bg-amber-100 hover:bg-amber-200 text-amber-600 rounded-full flex items-center justify-center transition-colors shadow-sm active:scale-90" title="শব্দটি দেখুন (হিন্ট)">
                                                <span className="font-bold text-xl sm:text-2xl">?</span>
                                            </button>
                                        </div>
                                        
                                        <div className="h-10 mt-3 sm:mt-4 flex items-center justify-center">
                                            {showHint ? (
                                                <span className="text-xl sm:text-2xl font-bold text-amber-700 tracking-wider bg-amber-50 px-4 sm:px-6 py-2 rounded-lg border border-amber-200 animate-pulse-fast shadow-inner">
                                                    {currentWord}
                                                </span>
                                            ) : (
                                                <p className="text-slate-500 text-xs sm:text-sm">শুনতে বা বুঝতে না পারলে '?' বাটনে ক্লিক করুন</p>
                                            )}
                                        </div>
                                    </div>

                                    <form onSubmit={handleFormSubmit} className="flex flex-col gap-3 sm:gap-4">
                                        <input
                                            ref={inputRef}
                                            type="text"
                                            value={userInput}
                                            onChange={(e) => setUserInput(e.target.value)}
                                            readOnly={isChecked}
                                            placeholder="বানানটি এখানে লিখুন..."
                                            className={`w-full text-center text-xl sm:text-2xl p-3 sm:p-4 border-2 rounded-xl outline-none transition-all ${
                                                isChecked ? (isCorrect ? 'border-green-500 bg-green-50 text-green-800' : 'border-red-500 bg-red-50 text-red-800') : 'border-slate-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200'
                                            }`}
                                            autoFocus autoComplete="off" spellCheck="false" autoCorrect="off" autoCapitalize="none"
                                        />

                                        {!isChecked ? (
                                            <button type="submit" disabled={!userInput.trim()} className="w-full py-3 sm:py-4 bg-slate-800 hover:bg-slate-900 disabled:bg-slate-400 text-white rounded-xl font-semibold text-base sm:text-lg transition-all active:scale-[0.98] mt-1 sm:mt-2">
                                                যাচাই করুন
                                            </button>
                                        ) : (
                                            <div className="mt-1 sm:mt-2 animate-fade-in">
                                                {isCorrect ? (
                                                    <div className="flex flex-col items-center text-green-600 gap-2 sm:gap-3">
                                                        <div className="flex items-center gap-2 font-semibold text-lg sm:text-xl">
                                                            <CheckCircle2 /> দারুণ! সঠিক বানান।
                                                        </div>
                                                        <button type="button" onClick={handleNext} className="w-full py-3 sm:py-4 bg-green-600 hover:bg-green-700 text-white rounded-xl font-semibold text-base sm:text-lg transition-all active:scale-[0.98] flex items-center justify-center gap-2 mt-1 sm:mt-2">
                                                            পরবর্তী শব্দ <ArrowRight />
                                                        </button>
                                                    </div>
                                                ) : (
                                                    <div className="flex flex-col items-center gap-3 sm:gap-4">
                                                        <div className="w-full bg-red-100 border border-red-200 text-red-700 p-3 sm:p-4 rounded-xl text-center">
                                                            <div className="flex items-center justify-center gap-2 font-bold mb-1">
                                                                <XCircle /> ভুল হয়েছে!
                                                            </div>
                                                            <div className="text-slate-600 text-xs sm:text-sm">সঠিক বানানটি হবে:</div>
                                                            <div className="text-2xl sm:text-3xl font-bold mt-1 tracking-wide text-red-800">{currentWord}</div>
                                                            <p className="text-[10px] sm:text-xs mt-2 opacity-80 text-red-600">শব্দটি আবার অনুশীলনের জন্য শেষে যুক্ত করা হয়েছে।</p>
                                                        </div>
                                                        <button type="button" onClick={handleNext} className="w-full py-3 sm:py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-semibold text-base sm:text-lg transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                                                            পরবর্তী শব্দ <ArrowRight />
                                                        </button>
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </form>
                                </div>
                                <div className="bg-slate-50 p-2 sm:p-3 text-center text-xs text-slate-400 border-t border-slate-100">
                                    অবশিষ্ট শব্দ: {queue.length + 1} টি
                                </div>
                            </div>
                        )}

                        {appState === 'finished' && (
                            <div className="p-8 sm:p-12 text-center flex flex-col items-center">
                                <div className="text-green-500 mb-4 sm:mb-6"><Trophy /></div>
                                <h2 className="text-2xl sm:text-3xl font-bold text-slate-800 mb-2">অভিনন্দন!</h2>
                                <p className="text-slate-600 text-base sm:text-lg mb-6 sm:mb-8">
                                    আপনি <strong>{currentBlock?.title}</strong> এর সবকটি শব্দের বানান সফলভাবে আয়ত্ত করেছেন। 
                                </p>
                                <button onClick={() => setAppState('welcome')} className="px-6 sm:px-8 py-3 bg-slate-800 hover:bg-slate-900 text-white rounded-xl font-medium transition-all shadow-md active:scale-[0.98] flex items-center gap-2">
                                    <RefreshCw /> অন্য ব্লক অনুশীলন করুন
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
